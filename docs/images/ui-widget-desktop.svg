<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="widgie desktop widgets mockup">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#133b5c"/>
      <stop offset="100%" stop-color="#1f6f8b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#wall)"/>

  <rect x="80" y="90" width="170" height="170" rx="22" fill="#111827" opacity="0.95"/>
  <text x="106" y="134" fill="#f9fafb" font-size="18" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Quick Note</text>
  <text x="104" y="165" fill="#cbd5e1" font-size="13" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Tap to type...</text>

  <rect x="280" y="90" width="320" height="180" rx="24" fill="#0b1020" opacity="0.94"/>
  <text x="312" y="136" fill="#dbeafe" font-size="20" font-family="-apple-system, BlinkMacSystemFont, sans-serif">GitHub Repo Stats</text>
  <text x="312" y="170" fill="#93c5fd" font-size="15" font-family="-apple-system, BlinkMacSystemFont, sans-serif">SuperCmdLabs/SuperCmd</text>
  <text x="312" y="200" fill="#e5e7eb" font-size="14" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Stars 12.4k  Forks 2.1k  Issues 18</text>

  <rect x="630" y="90" width="480" height="180" rx="24" fill="#111827" opacity="0.95"/>
  <text x="660" y="136" fill="#e5e7eb" font-size="20" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Quick Launcher</text>
  <rect x="660" y="160" width="56" height="56" rx="14" fill="#1d4ed8"/>
  <rect x="730" y="160" width="56" height="56" rx="14" fill="#059669"/>
  <rect x="800" y="160" width="56" height="56" rx="14" fill="#ea580c"/>
  <rect x="870" y="160" width="56" height="56" rx="14" fill="#7c3aed"/>

  <rect x="280" y="300" width="480" height="360" rx="28" fill="#0f172a" opacity="0.95"/>
  <text x="314" y="344" fill="#f8fafc" font-size="22" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Dashboard</text>
  <text x="314" y="380" fill="#cbd5e1" font-size="14" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Weather, calendar, reminders, and goals</text>

  <rect x="230" y="80" width="390" height="200" rx="26" fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="235" y="70" fill="#dbeafe" font-size="13" font-family="Menlo, monospace">snap guides + no-overlap placement</text>

  <text x="70" y="680" fill="#e5e7eb" font-size="14" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Apple-style discrete sizes: 170x170, 320x180, 480x180, 320x360, 480x360</text>
</svg>
